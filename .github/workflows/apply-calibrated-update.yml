name: Apply calibrated LEED tool update
on:
  push:
    paths:
      - '.github/workflows/apply-calibrated-update.yml'
permissions:
  contents: write
jobs:
  apply-update:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Write release files
        shell: python
        run: |
          import base64
          import json
          from pathlib import Path
          files = json.loads(r'''{"app.py":"","requirements.txt":"c3RyZWFtbGl0Pj0xLjU1LDwyLjAKcGFuZGFzPj0yLjEsPDMuMApweXBkZltjcnlwdG9dPj01LjAsPDcuMApweXRob24tZG9jeD49MS4xLDwyLjAKb3BlbnB5eGw+PTMuMSw8NC4wCnBpbGxvdz49MTEuMCw8MTMuMApweW11cGRmPj0xLjI1LDwyLjAKZXpkeGY+PTEuMyw8Mi4wCnB5dGVzdD49OC4wLDw5LjAK","README.md":"","Dockerfile":"",".dockerignore":"LnZlbnYKX19weWNhY2hlX18KKi5weWMKLnB5dGVzdF9jYWNoZQouZ2l0Ci5naXRpZ25vcmUKdGVzdHMKd29yawoqLmxvZwoK",".gitignore":"X19weWNhY2hlX18vCioucHlbY29kXQoucHl0ZXN0X2NhY2hlLwoudmVudi8KLmVudgouc3RyZWFtbGl0L3NlY3JldHMudG9tbAoK",".streamlit/config.toml":"","leed_tool/data.py":"","leed_tool/models.py":"","leed_tool/services/assessment.py":"","leed_tool/services/auto_assessment.py":"","leed_tool/services/checklist.py":"","leed_tool/services/export.py":"","leed_tool/services/guide.py":"","leed_tool/services/ingestion.py":"","leed_tool/services/official_result.py":"","leed_tool/services/review.py":"","leed_tool/services/risk.py":"","leed_tool/services/__init__.py":"","leed_tool/styles.py":"","leed_tool/__init__.py":"IiIiTXVsdGktdmVyc2lvbiBMRUVEIEF1dG9tYXRpb24gVG9vbCBkb21haW4gcGFja2FnZS4iIiIKCmZyb20gLm1vZGVscyBpbXBvcnQgUHJvamVjdFByb2ZpbGUKCl9fYWxsX18gPSBbIlByb2plY3RQcm9maWxlIl0K"}''')
          for name, content in files.items():
              target = Path(name)
              target.parent.mkdir(parents=True, exist_ok=True)
              target.write_bytes(base64.b64decode(content))
      - name: Commit release
        run: |
          rm -f .github/workflows/apply-calibrated-update.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add calibrated multi-version LEED review engine"
          git push
